- type: dungeonLevel
  id: MossyTemple4_Pvp
  parent:
  - BaseMossyTemplePostProcessDangerous
  name: ce-dungeon-mossy-dungeon-4-name
  uiPosition: 10,2
  exits:
    1: Arena
  config:
    !type:CEProceduralConfig
    generalCount:
      min: 15
      max: 20
    entranceCount:
      min: 3
      max: 3
    blessingCount:
      min: 1
      max: 1
    treasureCount:
      min: 0
      max: 2
    cycleCount:
      min: 10
      max: 10
  postProcess:

  # MOBS
  - !type:CEBudgetSpawnPostProcess
    budget: 40
    wakeOnSpawn: true
    excludedRoomTypes:
    - Entrance
    entries:
    - proto: CEMobSlimeFire
      cost: 3
    - proto: CEMobFlem
      cost: 3
    - proto: CEMobFlem2
      cost: 3
    - proto: CEMobFlem3
      cost: 5
    - proto: CEMobFireConstruct
      cost: 10
    - proto: CEMobPredatoryVine
      cost: 3
    - proto: CEMobSlimeFireBig
      cost: 8
    - proto: CEMobSlimeWaterBig
      cost: 2

  #LOOT X2 Loot compared to PvE version
  - !type:CEBudgetSpawnPostProcess #Herbs
    budget: 10
    tileWhitelist:
    - CEDirt
    - CEGrass
    - CEGrassLight
    - CEGrassTall
    entries:
    - proto: CESpawnerRandomFlowers
      cost: 1
  - !type:CEBudgetSpawnPostProcess #2 Key
    budget: 2
    anchoredWhitelist:
      components:
      - PlaceableSurface
    entries:
    - proto: CEIronKey
      cost: 1
  - !type:CEBudgetSpawnPostProcess #Guaranteed Healing
    budget: 50
    anchoredWhitelist:
      components:
      - PlaceableSurface
    entries:
    - proto: CEConsumablePotionRegeneration
      cost: 20
    - proto: CEConsumablePotionHealingSmall
      cost: 25
    - proto: CEConsumablePotionHealingMedium
      cost: 50
  - !type:CEBudgetSpawnPostProcess #Guaranteed Mana
    budget: 10
    anchoredWhitelist:
      components:
      - PlaceableSurface
    entries:
    - proto: CEConsumablePotionManaSmall
      cost: 5
    - proto: CEConsumablePotionManaMedium
      cost: 10

- type: dungeonLevel
  id: MossyTemple1_Pvp
  parent:
  - BaseMossyTemplePostProcessDangerous
  name: ce-dungeon-mossy-dungeon-1-name
  uiPosition: 2,2
  exits:
    1: MossyTemple2_Pvp
  config:
    !type:CEProceduralConfig
    generalCount:
      min: 7
      max: 10
    entranceCount:
      min: 3
      max: 3
    blessingCount:
      min: 1
      max: 1
    treasureCount:
      min: 0
      max: 2
    cycleCount:
      min: 1
      max: 2
  postProcess:

  # MOBS
  - !type:CEBudgetSpawnPostProcess
    budget: 10
    wakeOnSpawn: true
    excludedRoomTypes:
    - Entrance
    entries:
    - proto: CEMobRat
      cost: 1
      weight: 2
    - proto: CEMobSlimeWater
      cost: 3
    - proto: CEMobPredatoryVine
      cost: 3

  #LOOT X2 Loot compared to PvE version
  - !type:CEBudgetSpawnPostProcess #Herbs
    budget: 10
    tileWhitelist:
    - CEDirt
    - CEGrass
    - CEGrassLight
    - CEGrassTall
    entries:
    - proto: CESpawnerRandomFlowers
      cost: 1
  - !type:CEBudgetSpawnPostProcess #2 Key
    budget: 2
    anchoredWhitelist:
      components:
      - PlaceableSurface
    entries:
    - proto: CEIronKey
      cost: 1
  - !type:CEBudgetSpawnPostProcess #Guaranteed Healing
    budget: 50
    anchoredWhitelist:
      components:
      - PlaceableSurface
    entries:
    - proto: CEConsumablePotionRegeneration
      cost: 20
    - proto: CEConsumablePotionHealingSmall
      cost: 25
    - proto: CEConsumablePotionHealingMedium
      cost: 50
  - !type:CEBudgetSpawnPostProcess #Guaranteed Mana
    budget: 10
    anchoredWhitelist:
      components:
      - PlaceableSurface
    entries:
    - proto: CEConsumablePotionManaSmall
      cost: 5
    - proto: CEConsumablePotionManaMedium
      cost: 10
